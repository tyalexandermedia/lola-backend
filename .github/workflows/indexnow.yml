# IndexNow: notify Bing (ChatGPT search / Copilot / DuckDuckGo) + partners on
# every deploy. Google discovers via robots.txt-declared sitemap.
name: IndexNow submit
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy to settle
        run: sleep 120
      - name: Submit sitemap URLs to IndexNow
        run: |
          python3 - <<'PY'
          import json, re, urllib.request
          xml = urllib.request.urlopen('https://lola.tyalexandermedia.com/sitemap.xml', timeout=30).read().decode()
          urls = sorted(set(re.findall(r'<loc>(.*?)</loc>', xml)))
          body = json.dumps({
              'host': 'lola.tyalexandermedia.com',
              'key': '22a022ee88cb970590631f5efcd7ec1f',
              'keyLocation': 'https://lola.tyalexandermedia.com/22a022ee88cb970590631f5efcd7ec1f.txt',
              'urlList': urls,
          }).encode()
          req = urllib.request.Request('https://api.indexnow.org/indexnow', data=body,
              headers={'Content-Type': 'application/json; charset=utf-8'})
          r = urllib.request.urlopen(req, timeout=30)
          print(f'IndexNow: HTTP {r.status} — submitted {len(urls)} URLs')
          PY
