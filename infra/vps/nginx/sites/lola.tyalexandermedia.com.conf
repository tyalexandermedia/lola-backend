# lola.tyalexandermedia.com — Lola Cloud placeholder config (enable manually; see README.md)
# SSL: run after DNS points here:  sudo certbot --nginx -d lola.tyalexandermedia.com
server {
    listen 80;
    listen [::]:80;
    server_name lola.tyalexandermedia.com;

    root /opt/lola-cloud/agents/lola-backend/frontend;
    index index.html index.htm;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/frontend.access.log;
    error_log  /var/log/nginx/frontend.error.log;
}

