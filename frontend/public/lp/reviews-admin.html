<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Reviews — Lola Admin</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0A0A0B">
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A0A0B;color:#E8E4D8;line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
input,textarea{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#F0EAD6;width:100%;transition:border-color .15s}
input:focus,textarea:focus{outline:none;border-color:#D4AF37}
input[type=color]{padding:2px;height:40px;cursor:pointer}
:focus-visible{outline:2px solid #D4AF37;outline-offset:2px;border-radius:6px}

.wrap{max-width:920px;margin:0 auto;padding:24px 16px 96px}
header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.01em;color:#F0EAD6}
.sub{font-size:13px;color:#9CA3AF;margin-top:2px}

section{margin-bottom:32px}
h2{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#D4AF37;letter-spacing:.03em;margin-bottom:12px;text-transform:uppercase}

.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.row.single{grid-template-columns:1fr}
label{display:block;font-size:12px;font-weight:600;color:#C8C0B0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}

.btn{display:inline-flex;align-items:center;justify-content:center;background:#D4AF37;color:#0A0A0B;font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;padding:10px 18px;border-radius:8px;min-height:42px;transition:opacity .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,0.15);color:#E8E4D8}
.btn-ghost:hover{border-color:#D4AF37;color:#D4AF37;opacity:1}
.btn-sm{padding:6px 12px;min-height:32px;font-size:11px}

.muted{color:#6B7280;font-size:12px}
.hint{font-size:12px;color:#9CA3AF;margin-top:4px}
.autofill{margin-top:10px;padding:10px;background:rgba(212,175,55,0.06);border:1px dashed rgba(212,175,55,0.25);border-radius:8px;font-size:13px;display:none}
.autofill.show{display:block}
.autofill b{color:#D4AF37}

.empty{padding:32px;text-align:center;color:#6B7280;font-style:italic;border:1px dashed rgba(255,255,255,0.08);border-radius:12px}
.list{display:flex;flex-direction:column;gap:8px}
.biz{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden}
.biz-head{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;padding:12px}
.qr-thumb{width:56px;height:56px;background:#fff;border-radius:8px;padding:4px;display:flex;align-items:center;justify-content:center}
.qr-thumb img{max-width:100%;max-height:100%;display:block}
.biz-meta{min-width:0}
.biz-name{font-weight:700;font-size:15px;color:#F0EAD6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biz-sub{font-size:12px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biz-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

.expand{display:none;padding:14px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2)}
.expand.show{display:block}
.expand h3{font-family:'Bebas Neue',sans-serif;font-size:14px;color:#D4AF37;letter-spacing:.03em;text-transform:uppercase;margin-bottom:10px}

#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(60px);background:#0A0A0B;color:#E8E4D8;border:1.5px solid #D4AF37;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:1000;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:#EF4444;color:#FCA5A5}

#key-prompt{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;padding:20px;z-index:2000}
#key-prompt .card{max-width:380px;width:100%}
#key-prompt h2{margin-bottom:8px}

@media(max-width:600px){
  .row{grid-template-columns:1fr}
  .biz-head{grid-template-columns:48px 1fr;grid-template-rows:auto auto}
  .biz-actions{grid-column:1/-1;justify-content:flex-start}
  .qr-thumb{width:48px;height:48px}
}
</style>
</head>
<body>

<div id="key-prompt" style="display:none">
  <div class="card">
    <h2>Admin key</h2>
    <p class="muted" style="margin-bottom:12px">Paste your LOLA_SECRET_ADMIN_KEY. Stored locally on this device.</p>
    <div class="row single"><input id="key-input" type="password" placeholder="key" autocomplete="off"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="saveKey()">Save</button>
  </div>
</div>

<div class="wrap" id="app" style="display:none">

<header>
  <h1>Reviews · Lola Admin</h1>
  <div class="sub">Add businesses · copy share kits · send requests. <a href="#" onclick="clearKey();return false" style="color:#D4AF37">change key</a></div>
</header>

<!-- A: Add business -->
<section>
  <h2>Add business</h2>
  <div class="card">
    <div class="row single">
      <div>
        <label>Website</label>
        <input id="lookup-url" placeholder="sandbarsoftwash.com" autocomplete="off">
        <div class="hint">Paste the website and tab away — we autofill the rest from Google Places.</div>
      </div>
    </div>

    <div class="autofill" id="autofill">
      <b id="af-name"></b>
      <div class="muted" id="af-addr"></div>
      <div class="muted" id="af-meta"></div>
    </div>

    <div class="row" style="margin-top:14px">
      <div>
        <label>Owner email</label>
        <input id="f-owner-email" type="email" placeholder="owner@business.com" autocomplete="off">
      </div>
      <div>
        <label>Brand color</label>
        <input id="f-color" type="color" value="#D4AF37">
      </div>
    </div>
    <div class="row">
      <div>
        <label>Industry</label>
        <select id="f-industry" style="background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#F0EAD6;width:100%">
          <option value="home_service">Home service</option>
          <option value="contractor">Contractor</option>
          <option value="med_spa">Med spa</option>
          <option value="dentist">Dentist</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label>Logo URL (optional)</label>
        <input id="f-logo" placeholder="https://..." autocomplete="off">
      </div>
    </div>

    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" id="save-btn" onclick="saveBusiness()" disabled>Save business</button>
      <button class="btn btn-ghost btn-sm" onclick="resetForm()">Reset</button>
    </div>
  </div>
</section>

<!-- B: Business list -->
<section>
  <h2>Businesses</h2>
  <div id="list" class="list"></div>
</section>

</div>

<div id="toast"></div>

<script>
(function(){
  'use strict';

  var API_BASE = window.location.origin;
  var KEY = null;
  var LOOKUP = null; // last successful lookup result

  // ---- Boot ----
  function boot(){
    KEY = localStorage.getItem('lola_admin_key') || '';
    if (!KEY){ promptKey(); return; }
    document.getElementById('app').style.display = '';
    document.getElementById('key-prompt').style.display = 'none';
    loadBusinesses();
    wireLookup();
  }
  function promptKey(){
    document.getElementById('key-prompt').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    setTimeout(function(){ var i=document.getElementById('key-input'); if(i) i.focus(); }, 50);
  }
  window.saveKey = function(){
    var v = (document.getElementById('key-input').value || '').trim();
    if (!v) return;
    localStorage.setItem('lola_admin_key', v);
    boot();
  };
  window.clearKey = function(){
    localStorage.removeItem('lola_admin_key');
    KEY = null;
    promptKey();
  };

  // ---- API ----
  function hdr(){
    return { 'X-Admin-Key': KEY, 'Content-Type':'application/json', 'Accept':'application/json' };
  }
  function api(method, path, body){
    var opts = { method: method, headers: hdr() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    return fetch(API_BASE + path, opts).then(function(res){
      if (res.status === 401){
        toast('Bad admin key. Update and retry.', true);
        clearKey();
        throw new Error('auth');
      }
      return res;
    });
  }

  // ---- Toast ----
  var toastTimer = null;
  function toast(msg, isErr){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('err', !!isErr);
    t.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  // ---- A: lookup + add ----
  function wireLookup(){
    var input = document.getElementById('lookup-url');
    var ran = false;
    function run(){
      var v = (input.value || '').trim();
      if (!v || ran) return;
      ran = true;
      lookup(v).finally(function(){ ran = false; });
    }
    input.addEventListener('blur', run);
    input.addEventListener('keydown', function(e){
      if (e.key === 'Enter'){ e.preventDefault(); run(); }
    });
  }
  function lookup(url){
    var box = document.getElementById('autofill');
    box.classList.remove('show');
    LOOKUP = null;
    document.getElementById('save-btn').disabled = true;
    return api('POST', '/reviews/lookup-business?website=' + encodeURIComponent(url))
      .then(function(res){
        if (res.status === 404){ toast("Couldn't find that on Google Places.", true); return null; }
        if (!res.ok) throw new Error('lookup');
        return res.json();
      })
      .then(function(data){
        if (!data) return;
        LOOKUP = data;
        document.getElementById('af-name').textContent = data.name;
        document.getElementById('af-addr').textContent = data.address || '';
        var bits = [];
        if (data.phone) bits.push(data.phone);
        if (data.rating) bits.push(data.rating + '★ (' + (data.review_count || 0) + ')');
        if (data.verification_confidence) bits.push(data.verification_confidence + ' confidence');
        document.getElementById('af-meta').textContent = bits.join(' · ');
        box.classList.add('show');
        document.getElementById('save-btn').disabled = false;
      })
      .catch(function(e){ if (e.message !== 'auth') toast("Lookup failed.", true); });
  }
  window.resetForm = function(){
    document.getElementById('lookup-url').value = '';
    document.getElementById('f-owner-email').value = '';
    document.getElementById('f-logo').value = '';
    document.getElementById('autofill').classList.remove('show');
    document.getElementById('save-btn').disabled = true;
    LOOKUP = null;
  };
  window.saveBusiness = function(){
    if (!LOOKUP) return;
    var ownerEmail = (document.getElementById('f-owner-email').value || '').trim();
    if (!ownerEmail || ownerEmail.indexOf('@') < 0){ toast("Owner email required.", true); return; }
    var slug = slugify(LOOKUP.name);
    var payload = {
      id: slug,
      name: LOOKUP.name,
      industry: document.getElementById('f-industry').value,
      google_place_id: LOOKUP.place_id,
      owner_email: ownerEmail,
      brand_primary_color: document.getElementById('f-color').value || '#D4AF37',
      logo_url: (document.getElementById('f-logo').value || '').trim() || null
    };
    var btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    api('POST', '/reviews/businesses', payload)
      .then(function(res){
        if (!res.ok) throw new Error('save');
        return res.json();
      })
      .then(function(){
        toast('Added ' + LOOKUP.name);
        resetForm();
        loadBusinesses();
      })
      .catch(function(e){ if (e.message !== 'auth') toast('Save failed.', true); })
      .finally(function(){ btn.disabled = false; btn.textContent = 'Save business'; });
  };
  function slugify(s){
    return (s || '').toLowerCase().trim()
      .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60) || 'biz-' + Date.now();
  }

  // ---- B: list ----
  function loadBusinesses(){
    var list = document.getElementById('list');
    list.innerHTML = '<div class="muted" style="padding:16px">Loading…</div>';
    api('GET', '/reviews/businesses').then(function(res){
      if (!res.ok) throw new Error('list');
      return res.json();
    }).then(function(data){
      var rows = (data && data.businesses) || [];
      if (!rows.length){
        list.innerHTML = '<div class="empty">No businesses yet. Add one above.</div>';
        return;
      }
      list.innerHTML = '';
      rows.forEach(function(b){ list.appendChild(renderBiz(b)); });
    }).catch(function(e){
      if (e.message !== 'auth') list.innerHTML = '<div class="empty">Failed to load businesses.</div>';
    });
  }
  function renderBiz(b){
    var share = b.share || {};
    var wrap = document.createElement('div');
    wrap.className = 'biz';
    wrap.innerHTML =
      '<div class="biz-head">'+
        '<div class="qr-thumb"><img src="'+esc(share.qr_svg_url||'')+'" alt="QR" loading="lazy"></div>'+
        '<div class="biz-meta">'+
          '<div class="biz-name">'+esc(b.name)+'</div>'+
          '<div class="biz-sub">'+esc(b.owner_email||'')+(b.google_place_id?(' · '+esc(b.google_place_id).slice(0,18)+'…'):'')+'</div>'+
        '</div>'+
        '<div class="biz-actions">'+
          '<button class="btn btn-sm" data-act="copy">Copy share kit</button>'+
          '<button class="btn btn-ghost btn-sm" data-act="send">Send request</button>'+
        '</div>'+
      '</div>'+
      '<div class="expand">'+
        '<h3>Send a review request</h3>'+
        '<div class="row">'+
          '<div><label>Customer name</label><input data-fn="name" autocomplete="off" placeholder="Maria"></div>'+
          '<div><label>Customer email</label><input data-fn="email" type="email" autocomplete="off" placeholder="maria@example.com"></div>'+
        '</div>'+
        '<button class="btn" style="margin-top:10px" data-act="fire">Send</button>'+
      '</div>';

    var exp = wrap.querySelector('.expand');
    wrap.querySelector('[data-act=copy]').addEventListener('click', function(){ copyKit(b); });
    wrap.querySelector('[data-act=send]').addEventListener('click', function(){
      exp.classList.toggle('show');
      if (exp.classList.contains('show')){
        setTimeout(function(){ var n=exp.querySelector('[data-fn=name]'); if(n) n.focus(); }, 50);
      }
    });
    wrap.querySelector('[data-act=fire]').addEventListener('click', function(){
      sendRequest(b, exp);
    });
    return wrap;
  }
  function copyKit(b){
    var s = b.share || {};
    var text =
      'Public review page: ' + (s.public_review_url || '') + '\n' +
      'QR code: ' + (s.qr_svg_url || '') + '\n' +
      'SMS template: ' + (s.sms_template || '');
    var done = function(){ toast('Share kit copied for ' + b.name); };
    var fail = function(){ toast('Copy failed — long-press to copy manually.', true); };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(fail);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch(e){ fail(); }
      document.body.removeChild(ta);
    }
  }
  function sendRequest(b, exp){
    var name = (exp.querySelector('[data-fn=name]').value || '').trim();
    var email = (exp.querySelector('[data-fn=email]').value || '').trim();
    if (!email || email.indexOf('@') < 0){ toast('Customer email required.', true); return; }
    var btn = exp.querySelector('[data-act=fire]');
    btn.disabled = true; btn.textContent = 'Sending…';
    api('POST', '/reviews/request', {
      business_id: b.id,
      customer_name: name || null,
      customer_email: email
    }).then(function(res){
      if (!res.ok) throw new Error('send');
      return res.json();
    }).then(function(data){
      toast(data && data.sent ? 'Email sent.' : 'Logged (email send failed silently — check Resend).');
      exp.querySelector('[data-fn=name]').value = '';
      exp.querySelector('[data-fn=email]').value = '';
    }).catch(function(e){ if (e.message !== 'auth') toast('Send failed.', true); })
      .finally(function(){ btn.disabled = false; btn.textContent = 'Send'; });
  }

  // ---- util ----
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  }); }

  // Go
  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
